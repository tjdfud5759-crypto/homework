<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>사칙연산 계산기</title>

    <script src="caculator.js"></script>
</head>

<body>

    <h1>콘솔창 계산기 프로그램</h1>

    <h3>Windows OS의 경우</h3>

    <hr>

    <p>1. F12 키를 눌러 개발자 도구를 여세요.</p>

    <p>2. Console 메뉴를 선택하세요.</p>

    <p>3. start()를 콘솔창에 입력하여 계산기를 실행합니다.</p>

    <h3>Mac OS의 경우</h3>

    <hr>

    <p>1. Option + Command + I 키를 눌러 개발자 도구를 여세요.</p>

    <p>2. Console 메뉴를 선택하세요.</p>

    <p>3. start()를 콘솔창에 입력하여 계산기를 실행합니다.</p>

</body>

</html>
