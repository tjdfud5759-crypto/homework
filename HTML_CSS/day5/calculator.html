<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>JavaScript 사칙연산 계산기</title>

    <link
        rel="stylesheet"
        href="calculator_style.css"
    >

    <script
        src="calculator.js"
        defer
    ></script>
</head>

<body>

    <div class="calculator">

        <input
            type="text"
            id="display"
            value="0"
            readonly
            aria-label="계산 결과"
        >

        <div class="buttons">

            <button
                class="on-off"
                data-action="power"
            >
                ON/OFF
            </button>

            <button
                class="clear"
                data-action="clear"
            >
                C
            </button>

            <button
                class="operator"
                data-operator="/"
            >
                ÷
            </button>

            <button
                class="number"
                data-number="7"
            >
                7
            </button>

            <button
                class="number"
                data-number="8"
            >
                8
            </button>

            <button
                class="number"
                data-number="9"
            >
                9
            </button>

            <button
                class="operator"
                data-operator="*"
            >
                ×
            </button>

            <button
                class="number"
                data-number="4"
            >
                4
            </button>

            <button
                class="number"
                data-number="5"
            >
                5
            </button>

            <button
                class="number"
                data-number="6"
            >
                6
            </button>

            <button
                class="operator"
                data-operator="-"
            >
                −
            </button>

            <button
                class="number"
                data-number="1"
            >
                1
            </button>

            <button
                class="number"
                data-number="2"
            >
                2
            </button>

            <button
                class="number"
                data-number="3"
            >
                3
            </button>

            <button
                class="operator"
                data-operator="+"
            >
                +
            </button>

            <button
                class="number"
                data-number="."
            >
                .
            </button>

            <button
                class="number"
                data-number="0"
            >
                0
            </button>

            <button
                class="enter"
                data-action="calculate"
            >
                Enter
            </button>

        </div>

    </div>

</body>

</html>
